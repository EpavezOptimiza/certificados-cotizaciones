<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Optimiza — Iniciar sesión</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;height:100vh;overflow:hidden;display:flex}

/* ── PANEL IZQUIERDO ── */
.side-left{
  flex:0 0 52%;position:relative;overflow:hidden;
  background:#0d1b2e;
  display:flex;align-items:center;justify-content:center;
  transition:background .5s;
}

/* ── ESTILOS: capas de efecto ── */
#style-layer{position:absolute;inset:0;pointer-events:none;z-index:0}
canvas#style-canvas{position:absolute;inset:0;width:100%;height:100%}

/* ORBOS */
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.6;animation:float 8s ease-in-out infinite alternate;transition:background .5s,opacity .4s}
.orb1{width:440px;height:440px;top:-100px;left:-80px;animation-delay:0s}
.orb2{width:380px;height:380px;bottom:-80px;right:-60px;animation-delay:-3s}
.orb3{width:260px;height:260px;bottom:28%;left:28%;opacity:.3;animation-delay:-6s}
@keyframes float{0%{transform:translate(0,0) scale(1)}100%{transform:translate(22px,-18px) scale(1.06)}}

/* Dot grid (orbos, minimalista, hexagonal) */
#dot-grid{position:absolute;inset:0;pointer-events:none;
  background-image:radial-gradient(circle at 1px 1px,rgba(255,255,255,.07) 1px,transparent 0);
  background-size:32px 32px;transition:opacity .4s}

/* AURORA */
#aurora-layer{position:absolute;inset:0;opacity:0;transition:opacity .6s;
  background:linear-gradient(135deg,transparent 0%,rgba(255,255,255,.04) 50%,transparent 100%);
  background-size:200% 200%;animation:aurora-move 6s ease-in-out infinite alternate}
@keyframes aurora-move{0%{background-position:0% 50%}100%{background-position:100% 50%}}

/* ONDAS */
#waves-layer{position:absolute;bottom:0;left:0;right:0;height:100%;opacity:0;transition:opacity .6s}
.wave{position:absolute;bottom:0;left:-50%;width:200%;height:180px;border-radius:40%;opacity:.15;animation:wave-anim 6s ease-in-out infinite}
.wave:nth-child(1){animation-delay:0s;bottom:0}
.wave:nth-child(2){animation-delay:-2s;bottom:20px;opacity:.1}
.wave:nth-child(3){animation-delay:-4s;bottom:40px;opacity:.07}
@keyframes wave-anim{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

/* NEON */
#neon-layer{position:absolute;inset:0;opacity:0;transition:opacity .6s;pointer-events:none}
.neon-line{position:absolute;border-radius:2px;animation:neon-pulse 2s ease-in-out infinite alternate}
@keyframes neon-pulse{0%{opacity:.3;box-shadow:none}100%{opacity:1;box-shadow:0 0 20px var(--orb1-c),0 0 40px var(--orb1-c)}}

/* CRISTAL */
#cristal-layer{position:absolute;inset:0;opacity:0;transition:opacity .6s;pointer-events:none}
.glass-card{position:absolute;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:20px;backdrop-filter:blur(4px)}

/* GEOMETRICO */
#geo-layer{position:absolute;inset:0;opacity:0;transition:opacity .6s;pointer-events:none;overflow:hidden}
.geo-shape{position:absolute;border:1.5px solid rgba(255,255,255,.15);animation:geo-rotate 20s linear infinite}
@keyframes geo-rotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

/* HEXAGONAL */
#hex-layer{position:absolute;inset:0;opacity:0;transition:opacity .6s;pointer-events:none;overflow:hidden}

/* BRAND */
.brand{position:relative;z-index:2;text-align:center;color:#fff}
.brand-logo{margin-bottom:24px}
.brand-logo img{height:56px;filter:drop-shadow(0 0 24px rgba(99,102,241,.5))}
.brand-hex{font-size:52px;line-height:1;color:#fff;margin-bottom:8px;filter:drop-shadow(0 0 20px rgba(99,102,241,.6))}
.brand-name{font-size:28px;font-weight:800;letter-spacing:-1px;color:#fff;margin-bottom:6px;text-shadow:0 2px 20px rgba(0,0,0,.4)}
.brand-sub{font-size:14px;color:rgba(255,255,255,.5);letter-spacing:.5px}
.brand-tagline{margin-top:40px;font-size:13px;color:rgba(255,255,255,.35);max-width:280px;line-height:1.7;text-align:center}

/* ── PANEL DERECHO ── */
.side-right{flex:1;background:#f8fafc;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.side-right::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 80% 20%,rgba(99,102,241,.06),transparent 60%),
             radial-gradient(ellipse at 20% 80%,rgba(37,99,235,.04),transparent 60%)}

.login-box{position:relative;z-index:1;width:min(380px,90%)}
.login-title{font-size:26px;font-weight:800;color:#0f172a;margin-bottom:6px;letter-spacing:-.5px}
.login-sub{font-size:14px;color:#64748b;margin-bottom:36px}
.user-pick-label{font-size:12px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.user-list{display:flex;flex-direction:column;gap:8px;margin-bottom:24px;max-height:260px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#e2e8f0 transparent}

.user-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;border:1.5px solid #e2e8f0;background:#fff;cursor:pointer;transition:all .15s}
.user-item:hover{border-color:var(--accent,#2563eb);background:rgba(37,99,235,.04);transform:translateX(2px)}
.user-item.selected{border-color:var(--accent,#2563eb);background:rgba(37,99,235,.06);box-shadow:0 0 0 3px rgba(37,99,235,.1)}

.ui-avatar{width:38px;height:38px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;background:var(--avatar-bg)}
.ui-info{flex:1;min-width:0}
.ui-name{font-size:14px;font-weight:600;color:#0f172a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ui-role{font-size:11px;color:#94a3b8;font-weight:500}
.ui-check{opacity:0;transition:opacity .15s;color:var(--accent,#2563eb);font-size:18px}
.user-item.selected .ui-check{opacity:1}

.rol-admin    {--avatar-bg:linear-gradient(135deg,#d97706,#f59e0b)}
.rol-terreno  {--avatar-bg:linear-gradient(135deg,#6d28d9,#8b5cf6)}
.rol-ahorro,.rol-consultor{--avatar-bg:linear-gradient(135deg,#0d9488,#2dd4bf)}
.rol-ingreso  {--avatar-bg:linear-gradient(135deg,#b91c1c,#ef4444)}

.pass-wrap{position:relative;margin-bottom:16px}
.pass-wrap label{font-size:12px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.6px;display:block;margin-bottom:8px}
.pass-wrap input{width:100%;padding:13px 42px 13px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:15px;color:#0f172a;background:#fff;outline:none;transition:border .15s,box-shadow .15s;font-family:inherit}
.pass-wrap input:focus{border-color:var(--accent,#2563eb);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.pass-wrap input::placeholder{color:#cbd5e1}
.pass-toggle{position:absolute;right:12px;bottom:13px;background:none;border:none;cursor:pointer;color:#94a3b8;font-size:17px;padding:0}

.error-msg{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:14px;display:none}

.btn-login{width:100%;padding:14px;background:var(--btn,linear-gradient(135deg,#1d4ed8,#2563eb));color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s;font-family:inherit;letter-spacing:.2px}
.btn-login:hover:not(:disabled){opacity:.92;transform:translateY(-1px)}
.btn-login:disabled{opacity:.5;cursor:not-allowed}

.login-footer{margin-top:20px;text-align:center;font-size:12px;color:#94a3b8}
.pass-section{max-height:0;overflow:hidden;transition:max-height .3s ease,opacity .3s ease;opacity:0}
.pass-section.visible{max-height:200px;opacity:1}
</style>
</head>
<body>

<!-- Panel izquierdo -->
<div class="side-left" id="sideLeft">
  <!-- Capas de efecto según estilo -->
  <div id="dot-grid"></div>
  <div id="aurora-layer"></div>
  <div id="waves-layer">
    <div class="wave" id="wave1"></div>
    <div class="wave" id="wave2"></div>
    <div class="wave" id="wave3"></div>
  </div>
  <div id="neon-layer"></div>
  <div id="cristal-layer"></div>
  <div id="geo-layer"></div>
  <div id="hex-layer"></div>
  <canvas id="style-canvas" style="display:none"></canvas>

  <!-- Orbos (visibles en estilo orbos) -->
  <div class="orb orb1" id="orb1"></div>
  <div class="orb orb2" id="orb2"></div>
  <div class="orb orb3" id="orb3"></div>

  <!-- Marca -->
  <div class="brand">
    <div class="brand-logo">
      <img src="/static/logo_optimiza.png" alt="Optimiza"
           onerror="this.style.display='none';document.getElementById('brand-hex').style.display='block'">
      <div id="brand-hex" class="brand-hex" style="display:none">⬡</div>
    </div>
    <div class="brand-name">Optimiza</div>
    <div class="brand-sub">Certificados de Cotizaciones</div>
    <div class="brand-tagline">Gestión previsional eficiente,<br>rápida y sin complicaciones.</div>
  </div>
</div>

<!-- Panel derecho -->
<div class="side-right">
  <div class="login-box">
    <div class="login-title">Bienvenido</div>
    <div class="login-sub">Selecciona tu cuenta para continuar</div>
    <div class="user-pick-label">Usuarios</div>
    <div class="user-list" id="user-list">
      <div style="color:#94a3b8;font-size:13px;padding:8px">Cargando...</div>
    </div>
    <div class="pass-section" id="pass-section">
      <div class="pass-wrap">
        <label>Contraseña</label>
        <input type="password" id="pass-input" placeholder="Ingresa tu contraseña" autocomplete="current-password">
        <button class="pass-toggle" type="button" onclick="togglePass()">👁</button>
      </div>
      <div class="error-msg" id="error-msg"></div>
      <button class="btn-login" id="btn-login" onclick="doLogin()">Ingresar →</button>
    </div>
    <div class="login-footer">Optimiza Consulting &copy; 2025</div>
  </div>
</div>

<script>
const ROL_LABELS = {admin:'Admin',terreno:'Terreno',ahorro:'Ahorro',consultor:'Ahorro',ingreso:'Ingreso'};
let usuarioActual = null;
let _canvasAnim = null;

// ── Device ID ──
const DEVICE_ID_KEY = 'optimiza_device_id';
function getDeviceId() {
  let id = localStorage.getItem(DEVICE_ID_KEY);
  if (!id) {
    id = 'dev_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
    localStorage.setItem(DEVICE_ID_KEY, id);
    document.cookie = `device_id=${id};max-age=${86400*365};path=/`;
  }
  return id;
}

const DEFAULTS = {login_style:'orbos',color_bg:'#0d1b2e',color_orb1:'#2563eb',color_orb2:'#6366f1',color_btn:'#2563eb',color_icon:'#1d4ed8'};
const LS_PREFS_KEY = 'optimiza_login_prefs';

async function loadDevicePrefs() {
  try {
    const cached = JSON.parse(localStorage.getItem(LS_PREFS_KEY) || 'null');
    if (cached) applyPrefs(cached);
  } catch {}
  try {
    const r = await fetch('/api/device_prefs?device_id=' + encodeURIComponent(getDeviceId()));
    const d = await r.json();
    if (d.ok && d.prefs) {
      applyPrefs(d.prefs);
      localStorage.setItem(LS_PREFS_KEY, JSON.stringify(d.prefs));
    }
  } catch {}
}

function darken(hex) {
  try {
    const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
    return `rgb(${Math.max(0,r-35)},${Math.max(0,g-35)},${Math.max(0,b-35)})`;
  } catch { return hex; }
}

function hexToRgb(hex) {
  try {
    return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
  } catch { return [37,99,235]; }
}

function applyPrefs(p) {
  const bg   = p.color_bg   || DEFAULTS.color_bg;
  const orb1 = p.color_orb1 || DEFAULTS.color_orb1;
  const orb2 = p.color_orb2 || DEFAULTS.color_orb2;
  const btn  = p.color_btn  || DEFAULTS.color_btn;
  const style= p.login_style || DEFAULTS.login_style;

  document.getElementById('sideLeft').style.background = bg;
  document.getElementById('orb1').style.background = orb1;
  document.getElementById('orb2').style.background = orb2;
  document.getElementById('orb3').style.background = orb1;

  // Guardar colores como CSS vars para efectos
  const root = document.documentElement;
  root.style.setProperty('--accent', btn);
  root.style.setProperty('--btn', `linear-gradient(135deg,${darken(btn)},${btn})`);
  root.style.setProperty('--orb1-c', orb1);
  root.style.setProperty('--orb2-c', orb2);

  applyStyle(style, bg, orb1, orb2);
}

// ── Motor de estilos ──
function hideAllLayers() {
  ['dot-grid','aurora-layer','waves-layer','neon-layer','cristal-layer','geo-layer','hex-layer'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.opacity = '0';
  });
  ['orb1','orb2','orb3'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.style.opacity = '0'; el.style.transition = 'opacity .4s'; }
  });
  const cv = document.getElementById('style-canvas');
  if (cv) cv.style.display = 'none';
  if (_canvasAnim) { cancelAnimationFrame(_canvasAnim); _canvasAnim = null; }
}

function showOrbs(opacity1='.6', opacity2='.55', opacity3='.3') {
  document.getElementById('orb1').style.opacity = opacity1;
  document.getElementById('orb2').style.opacity = opacity2;
  document.getElementById('orb3').style.opacity = opacity3;
}

function applyStyle(style, bg, orb1, orb2) {
  hideAllLayers();
  const [r1,g1,b1] = hexToRgb(orb1);
  const [r2,g2,b2] = hexToRgb(orb2);

  switch(style) {

    case 'orbos':
    default:
      document.getElementById('dot-grid').style.opacity = '1';
      showOrbs('.6','.55','.3');
      break;

    case 'minimal':
      // Limpio: solo gradiente suave, sin orbes, sin puntos
      document.getElementById('sideLeft').style.background =
        `linear-gradient(160deg, ${bg} 0%, rgba(${r1},${g1},${b1},.15) 100%)`;
      break;

    case 'cristal': {
      // Orbes muy suaves + tarjetas de vidrio superpuestas
      showOrbs('.25','.2','.1');
      const layer = document.getElementById('cristal-layer');
      layer.innerHTML = `
        <div class="glass-card" style="width:180px;height:120px;top:10%;left:10%;transform:rotate(-8deg)"></div>
        <div class="glass-card" style="width:140px;height:90px;top:55%;left:55%;transform:rotate(12deg)"></div>
        <div class="glass-card" style="width:100px;height:100px;top:30%;right:8%;transform:rotate(-3deg)"></div>
        <div class="glass-card" style="width:200px;height:60px;bottom:12%;left:5%;transform:rotate(5deg)"></div>`;
      layer.style.opacity = '1';
      document.getElementById('dot-grid').style.opacity = '.4';
      break;
    }

    case 'geometrico': {
      // Formas geométricas: triángulos y rectángulos girando
      const geo = document.getElementById('geo-layer');
      geo.innerHTML = `
        <div class="geo-shape" style="width:200px;height:200px;top:5%;left:5%;animation-duration:25s;border-color:rgba(${r1},${g1},${b1},.25)"></div>
        <div class="geo-shape" style="width:140px;height:140px;top:10%;left:10%;animation-duration:18s;animation-direction:reverse;border-color:rgba(${r2},${g2},${b2},.2)"></div>
        <div class="geo-shape" style="width:300px;height:300px;bottom:-50px;right:-50px;animation-duration:30s;border-color:rgba(${r1},${g1},${b1},.15)"></div>
        <div class="geo-shape" style="width:180px;height:180px;bottom:20%;right:15%;animation-duration:22s;animation-direction:reverse;border-color:rgba(${r2},${g2},${b2},.2)"></div>
        <svg style="position:absolute;inset:0;width:100%;height:100%;opacity:.12" xmlns="http://www.w3.org/2000/svg">
          <defs><pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
            <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(${r1},${g1},${b1},1)" stroke-width="1"/>
          </pattern></defs>
          <rect width="100%" height="100%" fill="url(#grid)"/>
        </svg>`;
      geo.style.opacity = '1';
      showOrbs('.15','.1','0');
      break;
    }

    case 'neon': {
      // Líneas de neón brillantes
      const neon = document.getElementById('neon-layer');
      neon.innerHTML = `
        <div class="neon-line" style="width:2px;height:60%;top:20%;left:20%;background:rgba(${r1},${g1},${b1},.8);animation-delay:0s"></div>
        <div class="neon-line" style="width:2px;height:40%;top:30%;left:40%;background:rgba(${r2},${g2},${b2},.8);animation-delay:-.5s"></div>
        <div class="neon-line" style="width:2px;height:70%;top:10%;right:25%;background:rgba(${r1},${g1},${b1},.6);animation-delay:-1s"></div>
        <div class="neon-line" style="height:2px;width:50%;top:25%;left:10%;background:rgba(${r2},${g2},${b2},.7);animation-delay:-.3s"></div>
        <div class="neon-line" style="height:2px;width:35%;top:65%;left:25%;background:rgba(${r1},${g1},${b1},.7);animation-delay:-.8s"></div>
        <div class="neon-line" style="height:2px;width:60%;bottom:20%;right:0;background:rgba(${r2},${g2},${b2},.5);animation-delay:-1.2s"></div>`;
      neon.style.opacity = '1';
      showOrbs('.08','.06','0');
      break;
    }

    case 'aurora': {
      // Gradientes suaves animados tipo aurora boreal
      const left = document.getElementById('sideLeft');
      left.style.background = bg;
      const aurora = document.getElementById('aurora-layer');
      aurora.style.background = `
        radial-gradient(ellipse at 20% 50%, rgba(${r1},${g1},${b1},.4) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(${r2},${g2},${b2},.35) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 80%, rgba(${r1},${g1},${b1},.25) 0%, transparent 50%)`;
      aurora.style.backgroundSize = '100% 100%';
      aurora.style.animation = 'aurora-move 5s ease-in-out infinite alternate';
      aurora.style.opacity = '1';
      showOrbs('.12','.1','0');
      break;
    }

    case 'ondas': {
      const wl = document.getElementById('waves-layer');
      document.getElementById('wave1').style.background = `rgba(${r1},${g1},${b1},1)`;
      document.getElementById('wave2').style.background = `rgba(${r2},${g2},${b2},1)`;
      document.getElementById('wave3').style.background = `rgba(${r1},${g1},${b1},1)`;
      wl.style.opacity = '1';
      showOrbs('.08','.06','0');
      document.getElementById('dot-grid').style.opacity = '.3';
      break;
    }

    case 'cosmos':
      // Canvas con partículas tipo estrellas
      initCanvas('cosmos', r1,g1,b1, r2,g2,b2);
      showOrbs('.06','.05','0');
      break;

    case 'hexagonal':
      // Canvas con grid hexagonal animado
      initCanvas('hexagonal', r1,g1,b1, r2,g2,b2);
      showOrbs('.08','.06','0');
      break;

    case 'lluvia':
      // Canvas con partículas cayendo
      initCanvas('lluvia', r1,g1,b1, r2,g2,b2);
      showOrbs('.06','.05','0');
      break;
  }
}

// ── Canvas para efectos complejos ──
function initCanvas(type, r1,g1,b1, r2,g2,b2) {
  const cv = document.getElementById('style-canvas');
  cv.style.display = 'block';
  cv.width = cv.offsetWidth || 800;
  cv.height = cv.offsetHeight || 600;
  const ctx = cv.getContext('2d');

  if (type === 'cosmos') {
    const stars = Array.from({length:180}, () => ({
      x: Math.random() * cv.width,
      y: Math.random() * cv.height,
      r: Math.random() * 1.8 + .3,
      speed: Math.random() * .3 + .05,
      color: Math.random() > .5 ? `rgba(${r1},${g1},${b1},` : `rgba(${r2},${g2},${b2},`,
      alpha: Math.random()
    }));
    // Nebula orbs on canvas
    const nebulas = [
      {x:cv.width*.2, y:cv.height*.3, r:180, c:`rgba(${r1},${g1},${b1},.12)`},
      {x:cv.width*.8, y:cv.height*.7, r:150, c:`rgba(${r2},${g2},${b2},.1)`},
    ];
    function drawCosmos() {
      ctx.clearRect(0,0,cv.width,cv.height);
      nebulas.forEach(n => {
        const g = ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
        g.addColorStop(0, n.c); g.addColorStop(1,'transparent');
        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2); ctx.fill();
      });
      stars.forEach(s => {
        s.alpha += s.speed * .05;
        if (s.alpha > 1 || s.alpha < 0) s.speed *= -1;
        ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fillStyle = s.color + Math.min(1,Math.max(0,s.alpha)) + ')'; ctx.fill();
      });
      _canvasAnim = requestAnimationFrame(drawCosmos);
    }
    drawCosmos();
  }

  else if (type === 'hexagonal') {
    const size = 36, cols = Math.ceil(cv.width/(size*1.73))+2, rows = Math.ceil(cv.height/(size*1.5))+2;
    let tick = 0;
    function drawHex() {
      ctx.clearRect(0,0,cv.width,cv.height);
      tick += .015;
      for (let row = -1; row < rows; row++) {
        for (let col = -1; col < cols; col++) {
          const x = col * size * 1.73 + (row%2) * size * .865;
          const y = row * size * 1.5;
          const wave = Math.sin(tick + col*.4 + row*.3);
          const alpha = (wave + 1) / 2 * .25 + .03;
          const useColor = (col+row) % 2 === 0 ? `rgba(${r1},${g1},${b1},` : `rgba(${r2},${g2},${b2},`;
          ctx.beginPath();
          for (let i = 0; i < 6; i++) {
            const angle = Math.PI/3*i - Math.PI/6;
            const px = x + size*.9 * Math.cos(angle);
            const py = y + size*.9 * Math.sin(angle);
            i === 0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
          }
          ctx.closePath();
          ctx.strokeStyle = useColor + alpha + ')'; ctx.lineWidth = 1; ctx.stroke();
        }
      }
      _canvasAnim = requestAnimationFrame(drawHex);
    }
    drawHex();
  }

  else if (type === 'lluvia') {
    const drops = Array.from({length:120}, () => ({
      x: Math.random() * cv.width,
      y: Math.random() * cv.height,
      len: Math.random() * 15 + 8,
      speed: Math.random() * 3 + 1.5,
      alpha: Math.random() * .5 + .1,
      color: Math.random() > .5 ? `rgba(${r1},${g1},${b1},` : `rgba(${r2},${g2},${b2},`
    }));
    function drawRain() {
      ctx.clearRect(0,0,cv.width,cv.height);
      drops.forEach(d => {
        ctx.beginPath();
        ctx.moveTo(d.x, d.y);
        ctx.lineTo(d.x - d.len*.2, d.y + d.len);
        ctx.strokeStyle = d.color + d.alpha + ')';
        ctx.lineWidth = 1;
        ctx.stroke();
        d.y += d.speed;
        if (d.y > cv.height + 20) { d.y = -20; d.x = Math.random() * cv.width; }
      });
      _canvasAnim = requestAnimationFrame(drawRain);
    }
    drawRain();
  }
}

// ── Usuarios ──
async function cargarUsuarios() {
  try {
    const r = await fetch('/api/usuarios_publicos');
    const data = await r.json();
    renderUsuarios(data.usuarios || []);
  } catch {
    document.getElementById('user-list').innerHTML = '<div style="color:#ef4444;font-size:13px">Error cargando usuarios</div>';
  }
}

function renderUsuarios(usuarios) {
  const list = document.getElementById('user-list');
  if (!usuarios.length) { list.innerHTML = '<div style="color:#94a3b8;font-size:13px;padding:8px">Sin usuarios registrados</div>'; return; }
  list.innerHTML = usuarios.map(u => {
    const inicial = (u.nombre || u.username || '?')[0].toUpperCase();
    const rol = u.rol || 'terreno';
    const rolLabel = ROL_LABELS[rol] || rol;
    return `<div class="user-item rol-${rol}" id="ui-${escId(u.username)}"
        onclick="seleccionar('${esc(u.username)}','${esc(u.nombre||u.username)}','${esc(rol)}')">
      <div class="ui-avatar">${inicial}</div>
      <div class="ui-info">
        <div class="ui-name">${escHtml(u.nombre||u.username)}</div>
        <div class="ui-role">${rolLabel}</div>
      </div>
      <div class="ui-check">✓</div>
    </div>`;
  }).join('');
}

function esc(s){ return (s||'').replace(/'/g,"\\'"); }
function escId(s){ return (s||'').replace(/[^a-zA-Z0-9_-]/g,'_'); }
function escHtml(s){ return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function seleccionar(username, nombre, rol) {
  usuarioActual = username;
  document.querySelectorAll('.user-item').forEach(el => el.classList.remove('selected'));
  const el = document.getElementById('ui-' + escId(username));
  if (el) el.classList.add('selected');
  const sec = document.getElementById('pass-section');
  sec.classList.add('visible');
  document.getElementById('error-msg').style.display = 'none';
  document.getElementById('pass-input').value = '';
  setTimeout(() => document.getElementById('pass-input').focus(), 350);
}

function togglePass() {
  const inp = document.getElementById('pass-input');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && usuarioActual) doLogin();
});

async function doLogin() {
  const passInput = document.getElementById('pass-input');
  const password = passInput.value;
  const errEl = document.getElementById('error-msg');
  errEl.style.display = 'none';
  if (!password) { errEl.textContent = 'Ingresa tu contraseña.'; errEl.style.display = 'block'; return; }
  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = 'Verificando...';
  try {
    const r = await fetch('/login', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username: usuarioActual, password})});
    const d = await r.json();
    if (r.ok) { window.location.href = '/'; }
    else {
      errEl.textContent = d.error || 'Contraseña incorrecta.';
      errEl.style.display = 'block';
      passInput.value = ''; passInput.focus();
      btn.disabled = false; btn.textContent = 'Ingresar →';
    }
  } catch {
    errEl.textContent = 'Error de conexión. Intenta nuevamente.';
    errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Ingresar →';
  }
}

loadDevicePrefs();
cargarUsuarios();
</script>
